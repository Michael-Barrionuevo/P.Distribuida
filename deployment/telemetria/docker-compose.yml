name: telemetria
services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Badboy22
      POSTGRES_DB: books-db
    volumes:
      - /Users/veykerbarrionuevo/P.Distribuida/db:/var/lib/postgresql/data
    ports:
      - 54321:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d books-db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgresql-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgresql-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:Badboy22@db-server:5432/books-db?sslmode=disable"
    ports:
      - 9187:9187
    depends_on:
      db-server:
        condition: service_healthy

  consul:
    image: consul:1.15.4
    command: ["agent", "-dev", "-ui", "-bind=0.0.0.0", "-client=0.0.0.0"]
    ports:
      - 8500:8500
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 5s
      timeout: 5s
      retries: 5

  proxy:
    image: traefik:3.7.5
    container_name: proxy-1
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--entryPoints.http.address=:80"
      - "--entryPoints.traefik.address=:8080"
      - "--entryPoints.metrics.address=:8082"
      - "--providers.consulcatalog=true"
      - "--providers.consulcatalog.endpoint.address=consul:8500"
      - "--providers.consulcatalog.exposedByDefault=false"
      - "--providers.consulcatalog.refreshInterval=5s"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
    ports:
      - "8089:80"
      - "8088:8080"
      - "8082:8082"
    depends_on:
      consul:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-1
    volumes:
      - ./configs:/etc/prometheus
    ports:
      - 9090:9090
    expose:
      - 9000
    depends_on:
      consul:
        condition: service_healthy

  graphana:
    image: grafana/grafana-oss:latest
    container_name: graphana-1
    ports:
      - 3000:3000

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger-all-in-one
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: Badboy22
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8070:8080
    depends_on:
      db-server:
        condition: service_healthy
      consul:
        condition: service_healthy

  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: Badboy22
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8081:8080
    depends_on:
      db-server:
        condition: service_healthy
      consul:
        condition: service_healthy

  customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: customers-app
    environment:
      SERVER_PORT: 8090
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
    ports:
      - 8083:8090
    depends_on:
      consul:
        condition: service_healthy

volumes:
  postgres-data: